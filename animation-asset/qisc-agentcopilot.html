<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgentLabs Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #e5e5e5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }

    /* ─── root wrapper ─── */
    .agentlabs-room {
      display: flex;
      width: 961px;
      height: 729px;
      overflow: hidden;
      border: 2px solid #f2f2f2;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.12);
    }

    /* ══════════════════════════════════════
       LEFT — ChatBox  (892 px)
    ══════════════════════════════════════ */
    .chatbox {
      display: flex;
      flex-direction: column;
      width: 589px;
      height: 729px;
      background: #f7f7f7;
      border-right: 1px solid #eeeeee;
      flex-shrink: 0;
    }

    /* top bar */
    .chatbox-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      height: 76px;
      padding: 8px 28px;
      background: #ffffff;
      border-bottom: 1px solid #f2f2f2;
      flex-shrink: 0;
    }

    .chatbox-name-group {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .chatbox-avatar {
      position: relative;
      width: 35px;
      height: 35px;
      flex-shrink: 0;
    }
    .chatbox-avatar svg { width: 35px; height: 35px; display: block; }
    .chatbox-avatar-initial {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 500;
      color: #fff;
      line-height: 1;
      padding-bottom: 1px;
    }

    .chatbox-sender-name {
      font-size: 14px;
      font-weight: 700;
      color: #666666;
      white-space: nowrap;
    }

    .chatbox-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chatbox-label-agentlabs {
      font-size: 12px;
      font-weight: 400;
      color: #666666;
      white-space: nowrap;
    }

    .chatbox-toggle { width: 32.64px; height: 17.80px; flex-shrink: 0; display: flex; }
    .chatbox-toggle svg { width: 100%; height: 100%; }

    .chatbox-resolve { width: 64.54px; height: 17.80px; flex-shrink: 0; display: flex; }
    .chatbox-resolve svg { width: 100%; height: 100%; }

    .chatbox-info { width: 14.84px; height: 14.84px; flex-shrink: 0; display: flex; }
    .chatbox-info svg { width: 100%; height: 100%; }

    .chatbox-menu { width: 2.97px; height: 11.87px; flex-shrink: 0; display: flex; }
    .chatbox-menu svg { width: 100%; height: 100%; }

    /* date notification */
    .chatbox-date-row {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .date-badge {
      position: relative;
      width: 146.56px;
      height: 22.61px;
      flex-shrink: 0;
    }
    .date-badge svg { width: 100%; height: 100%; display: block; }
    .date-badge-text {
      position: absolute;
      top: 5px;
      left: 29px;
      font-size: 8px;
      font-weight: 700;
      color: #898e97;
      white-space: nowrap;
      letter-spacing: 0.3px;
      line-height: 1.5;
    }

    /* ── chat body ── */
    .chatbox-body {
      flex: 1;
      background: #f7f7f7;
      overflow-y: auto;
      padding: 44px 0 76px;
      display: flex;
      flex-direction: column;
      gap: 61px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .chatbox-body::-webkit-scrollbar { display: none; }
    .chatbox-body { transition: opacity 0.6s ease; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── message group (avatar + stacked bubbles) ── */
    .cf-group {
      display: flex;
      align-items: flex-start;
      gap: 11px;
      animation: fadeInUp 0.3s ease-out forwards;
    }
    .cf-group.cf-sender { padding-left: 28px; }
    .cf-group.cf-agent  { flex-direction: row-reverse; padding-right: 28px; }

    /* avatar circle */
    .cf-avatar {
      position: relative;
      width: 35px;
      height: 35px;
      flex-shrink: 0;
    }
    .cf-avatar svg { width: 35px; height: 35px; display: block; }
    .cf-avatar-initial {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 400;
      color: #fff;
      line-height: 1;
    }

    /* bubble column */
    .cf-content {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 360px;
    }
    .cf-group.cf-sender .cf-content { max-width: 380px; }
    .cf-group.cf-agent  .cf-content { align-items: flex-end; }

    .cf-name {
      font-size: 10px;
      font-weight: 400;
      color: #828282;
      letter-spacing: -0.17px;
      line-height: 1;
    }

    /* ── bubbles ── */
    .cf-bubble-img {
      display: block;
      width: 100%;
      border-radius: 15px 15px 0 0;
      object-fit: cover;
    }
    .cf-bubble-body { padding: 8px 14px; }

    .cf-bubble {
      animation: fadeInUp 0.3s ease-out forwards;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.5;
      color: #374151;
      word-break: break-word;
    }
    /* customer: green, flat top-left */
    .cf-sender-bubble {
      background: #D2EDDB;
      border-radius: 0 15px 15px 15px;
    }
    /* agent: white, flat top-right */
    .cf-agent-bubble {
      background: #ffffff;
      border-radius: 15px 0 15px 15px;
      color: #0f172a;
      font-weight: 400;
    }

    /* ── card bubble ── */
    .cf-card {
      border-radius: 8px !important;
      padding: 8px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .cf-card-preview {
      display: flex;
      gap: 0;
      background: #ececec;
      border-radius: 5px;
      overflow: hidden;
      height: 105px;
    }
    .cf-card-img {
      width: 120px;
      height: 105px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .cf-card-meta {
      padding: 13px 13px 13px 24px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .cf-card-title {
      font-size: 14px;
      font-weight: 700;
      color: #374151;
      line-height: 1.3;
    }
    .cf-card-sub {
      font-size: 11px;
      font-weight: 400;
      color: #6b7280;
      line-height: 1.28;
    }
    .cf-card-body {
      font-size: 15px;
      font-weight: 400;
      color: #0f172a;
      line-height: 1.5;
    }
    .cf-card-body strong { font-weight: 700; }

    /* ── CTA bubble ── */
    .cf-cta {
      border-radius: 8px !important;
      text-align: center;
      font-weight: 700 !important;
      color: #27B199 !important;
      background: #ffffff;
      width: 100%;
      box-sizing: border-box;
    }



    /* ── typing indicator ── */
    .cf-typing {
      display: flex;
      align-items: flex-start;
      gap: 11px;
      animation: fadeInUp 0.3s ease-out forwards;
    }
    .cf-typing.cf-sender { padding-left: 28px; }
    .cf-typing.cf-agent  { flex-direction: row-reverse; padding-right: 28px; }
    .cf-typing-dots {
      background: #ffffff;
      border-radius: 15px 15px 0 15px;
      padding: 10px 14px;
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .cf-typing-dots span {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #aaa;
      display: inline-block;
      animation: dotBounce 0.9s infinite ease-in-out;
    }
    .cf-typing-dots span:nth-child(1) { animation-delay:   0ms; }
    .cf-typing-dots span:nth-child(2) { animation-delay: 150ms; }
    .cf-typing-dots span:nth-child(3) { animation-delay: 300ms; }

    @keyframes dotBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-6px); }
    }

    /* ══════════════════════════════════════
       RIGHT — Sidebar: Chat & Customer Info (340 px)
    ══════════════════════════════════════ */
    .cust-info {
      display: flex;
      flex-direction: column;
      width: 372px;
      height: 729px;
      background: #ffffff;
      border-left: 1px solid #eeeeee;
      flex-shrink: 0;
      overflow: hidden;
    }

    /* ── Header ── */
    .sb-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 76px;
      padding: 0 21px;
      background: #fafaf7;
      flex-shrink: 0;
    }
    .sb-title {
      font-size: 13.45px;
      font-weight: 500;
      color: #555555;
      white-space: nowrap;
      line-height: normal;
    }
    .sb-close {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
    }

    /* ── Profile section ── */
    .sb-profile {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 24px 20px;
      background: #ffffff;
      flex-shrink: 0;
    }
    .sb-avatar-wrap {
      position: relative;
      width: 45px;
      height: 45px;
      flex-shrink: 0;
    }
    .sb-avatar-img {
      display: block;
      width: 45px;
      height: 45px;
    }
    .sb-avatar-initial {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 27px;
      font-weight: 500;
      color: #ffffff;
      line-height: 1;
    }
    .sb-wa-badge {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 13px;
      height: 13px;
      display: block;
    }
    .sb-customer-info {
      display: flex;
      flex: 1;
      align-items: flex-start;
      justify-content: space-between;
      min-width: 0;
    }
    .sb-customer-details {
      display: flex;
      flex-direction: column;
      gap: 2px;
      width: 117px;
    }
    .sb-customer-name {
      font-size: 13.45px;
      font-weight: 700;
      color: #555555;
      line-height: normal;
    }
    .sb-customer-channel {
      font-size: 11.769px;
      font-weight: 600;
      color: #555555;
      line-height: normal;
    }
    .sb-icon-edit {
      width: 14.024px;
      height: 15.131px;
      display: block;
      flex-shrink: 0;
    }

    /* ── Info rows (Ticketing, Properties, Notes) ── */
    .sb-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 20px;
      border-top: 1px solid #efefef;
      flex-shrink: 0;
    }
    .sb-row-label {
      font-size: 11.769px;
      font-weight: 600;
      color: #a1a0a3;
      text-transform: uppercase;
      white-space: nowrap;
      line-height: normal;
    }
    .sb-row-teal {
      font-size: 11.769px;
      font-weight: 500;
      color: #23b098;
      letter-spacing: -0.053px;
      line-height: normal;
    }
    .sb-badge {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sb-badge-count {
      font-size: 10.087px;
      font-weight: 700;
      color: #2cb79e;
      line-height: normal;
    }
    .sb-chevron {
      width: 5.044px;
      height: 10.087px;
      display: block;
    }
    .sb-notes-right {
      display: flex;
      align-items: center;
      gap: 13px;
    }
    .sb-note-text {
      font-size: 10.087px;
      font-weight: 400;
      color: #2cb79e;
      white-space: nowrap;
      margin-top: 0.84px;
      line-height: normal;
    }
    .sb-note-icon {
      position: relative;
      width: 11.348px;
      height: 13.87px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .sb-note-icon img {
      position: absolute;
      width: 7111.11%;
      height: 3636.36%;
      left: -6883.33%;
      top: -1500%;
      max-width: none;
    }

    /* ── Tags section ── */
    .sb-tags {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 20px;
      border-top: 1px solid #efefef;
      flex: 1;
      min-height: 0;
    }
    .sb-tags-label {
      font-size: 11.769px;
      font-weight: 600;
      color: #a1a0a3;
      text-transform: uppercase;
      line-height: normal;
      flex-shrink: 0;
    }
    .sb-tags-input-row {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .sb-tags-input-box {
      position: relative;
      width: 264.706px;
      height: 31.944px;
      border: 0.841px solid #ededed;
      border-radius: 5.044px;
      background: #ffffff;
      flex-shrink: 0;
    }
    .sb-tags-placeholder {
      position: absolute;
      left: 14px;
      top: 5.94px;
      font-size: 12px;
      font-weight: 400;
      color: #9ca3af;
      opacity: 0.5;
      letter-spacing: -0.24px;
      line-height: 1.55;
      white-space: nowrap;
    }
    .sb-tags-check {
      width: 14.118px;
      height: 8.406px;
      display: block;
      flex-shrink: 0;
      margin-left: 21.176px;
    }
    .sb-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-content: flex-start;
    }
    .sb-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 12px;
      background: #d2eddb;
      border-radius: 24px;
      font-size: 11px;
      font-weight: 500;
      color: #374151;
      letter-spacing: -0.22px;
      line-height: 1.55;
      white-space: nowrap;
    }

    /* ══════════════════════════════════════
       Conversation Summary — Right Panel
    ══════════════════════════════════════ */
    .sb-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 14px 20px;
      border-top: 1px solid #efefef;
      flex-shrink: 0;
    }
    .sb-field-summary {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .sb-field-label {
      font-size: 11.769px;
      font-weight: 600;
      color: #a1a0a3;
      text-transform: uppercase;
      line-height: normal;
      letter-spacing: 0.3px;
    }
    .sb-field-value {
      font-size: 12px;
      font-weight: 500;
      color: #a1a0a3;
      line-height: 1.4;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.55s ease, transform 0.55s ease, color 0.4s ease;
      white-space: normal;
    }
    .sb-field-value.visible {
      opacity: 1;
      transform: translateY(0);
      color: #23b098;
    }
    .sb-summary-box {
      flex: 1;
      border: 0.841px solid #ededed;
      border-radius: 5.044px;
      padding: 12px 14px;
      font-size: 12px;
      color: #374151;
      line-height: 1.55;
      min-height: 110px;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .sb-summary-placeholder {
      color: #9ca3af;
      opacity: 0.5;
      font-size: 12px;
      letter-spacing: -0.24px;
      line-height: 1.55;
    }
    .sb-summary-text {
      font-size: 12px;
      line-height: 1.55;
      color: #374151;
      opacity: 0;
      transition: opacity 0.35s ease;
      white-space: pre-wrap;
    }
    .sb-summary-text.visible { opacity: 1; }
    .sb-ai-dot {
      display: none;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 500;
      color: #23b098;
      opacity: 0;
      transition: opacity 0.4s ease;
      flex-shrink: 0;
    }
    .sb-ai-dot.visible { display: flex; opacity: 1; }
    .sb-ai-dot::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #23b098;
      flex-shrink: 0;
      animation: aiPulse 1s infinite ease-in-out;
    }
    @keyframes aiPulse {
      0%,100% { opacity:1; transform:scale(1);   }
      50%      { opacity:.3; transform:scale(.65); }
    }
  </style>
</head>
<body>

<div class="agentlabs-room">

  <!-- ════════════ LEFT: ChatBox ════════════ -->
  <div class="chatbox">

    <!-- Header -->
    <div class="chatbox-header">
      <!-- Left: Avatar + Name -->
      <div class="chatbox-name-group">
        <div class="chatbox-avatar">
          <!-- pp-bg-chatbox circle -->
          <svg viewBox="0 0 35 35" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="17.5" cy="17.5" r="17.5" fill="#8B7355"/>
          </svg>
          <div class="chatbox-avatar-initial">J</div>
        </div>
        <span class="chatbox-sender-name">Jimmy Taylor</span>
      </div>

      <!-- Right: Controls -->
      <div class="chatbox-controls">
        <span class="chatbox-label-agentlabs">AgentLabs</span>

        <!-- Toggle button -->
        <div class="chatbox-toggle">
          <svg viewBox="0 0 32.6423 17.8049" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M0 8.90245C0 3.98577 3.98606 0 8.90243 0H23.7398C28.6562 0 32.6423 3.98577 32.6423 8.90245C32.6423 13.8191 28.6562 17.8049 23.7398 17.8049H8.90243C3.98606 17.8049 0 13.8191 0 8.90245Z" fill="#D1D5DB"/>
            <circle cx="8.9027"  cy="8.9027" r="7.3187" fill="white" filter="drop-shadow(0 0.2px 0.8px rgba(0,0,0,.15))"/>
          </svg>
        </div>

        <!-- Resolve button -->
        <div class="chatbox-resolve">

          if (type === 'sender') {
            el.innerHTML = SENDER_AVATAR_SVG +
              '<span class="cf-avatar-initial">J</span>';
          } else {
            el.innerHTML = AGENT_AVATAR_SVG +
              '<span class="cf-avatar-initial">H</span>';
          }
          return el;
        }

        /* ── get or create a message group ── */
        let senderGroup = null, agentGroup = null;

        function getOrCreateGroup(type) {
          if (type === 'sender' && senderGroup) return senderGroup;
          if (type === 'agent'  && agentGroup)  return agentGroup;

          const group = document.createElement('div');
          group.className = 'cf-group cf-' + type;

          const avatar = makeAvatar(type);

          const content = document.createElement('div');
          content.className = 'cf-content';

          const name = document.createElement('div');
          name.className = 'cf-name';
          name.textContent = type === 'sender' ? 'Jimmy Taylor' : 'Human Agent';
          if (type === 'agent') name.style.textAlign = 'right';
          content.appendChild(name);

          group.appendChild(avatar);
          group.appendChild(content);
          body.appendChild(group);

          if (type === 'sender') senderGroup = group;
          else agentGroup = group;

          return group;
        }

        function getContent(type) {
          return (type === 'sender' ? senderGroup : agentGroup)
            .querySelector('.cf-content');
        }

        /* ── append a plain bubble ── */
        function appendBubble(type, text) {
          getOrCreateGroup(type);
          const bubble = document.createElement('div');
          bubble.className = 'cf-bubble cf-' + type + '-bubble';
          bubble.innerHTML = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
          getContent(type).appendChild(bubble);
          smartScroll();
        }



        /* ── typing indicator (sender or agent side) ── */
        let typingEl = null;
        function showTyping(type = 'agent') {
          typingEl = document.createElement('div');
          const isSender = type === 'sender';
          typingEl.className = isSender ? 'cf-typing cf-sender' : 'cf-typing cf-agent';
          const avatarWrap = document.createElement('div');
          avatarWrap.className = 'cf-avatar';
          if (isSender) {
            avatarWrap.innerHTML = SENDER_AVATAR_SVG + '<span class="cf-avatar-initial">J</span>';
          } else {
            avatarWrap.innerHTML = AGENT_AVATAR_SVG + '<span class="cf-avatar-initial">H</span>';
          }
          const dots = document.createElement('div');
          dots.className = 'cf-typing-dots';
          dots.innerHTML = '<span></span><span></span><span></span>';
          typingEl.appendChild(avatarWrap);
          typingEl.appendChild(dots);
          body.appendChild(typingEl);
          smartScroll();
        }
        function hideTyping() {
          if (typingEl) { body.removeChild(typingEl); typingEl = null; }
        }

        /* ── animation timeline ── */
        const TOTAL_DURATION = 38500;
        const LOOP_PAUSE     = 5000;
        const FADE_DURATION  =  600;

        /* ── sidebar animation helpers ── */
        function activateSidebarField(id, text, delay) {
          setTimeout(() => {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = text;
            requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('visible')));
          }, delay);
        }

        function runSummaryTypewriter(delay) {
          const summaryText =
            'Customer Jimmy Taylor reports order #QSC12345 has not arrived 5 days ' +
            'after dispatch. Expected delivery was 2\u20133 days. Package was last scanned ' +
            'at Jakarta sorting facility on Monday. Customer already contacted courier ' +
            'directly with no resolution. Agent escalated to logistics and is now ' +
            'contacting courier to resolve immediately.';
          setTimeout(() => {
            const dot = document.getElementById('sb-ai-dot');
            const ph  = document.getElementById('sb-summary-placeholder');
            const sum = document.getElementById('sb-summary-text');
            if (dot) dot.classList.add('visible');
            setTimeout(() => {
              if (dot) dot.classList.remove('visible');
              if (ph)  ph.style.display = 'none';
              if (sum) {
                sum.classList.add('visible');
                let i = 0;
                const iv = setInterval(() => {
                  sum.textContent = summaryText.slice(0, i);
                  i++;
                  if (i > summaryText.length) clearInterval(iv);
                }, 20);
              }
            }, 4000);
          }, delay);
        }

        function resetSidebar() {
          ['sb-order-id','sb-issue','sb-last-action','sb-next-step'].forEach(id => {
            const el = document.getElementById(id);
            if (el) { el.textContent = '\u2014'; el.classList.remove('visible'); }
          });
          const dot = document.getElementById('sb-ai-dot');
          const ph  = document.getElementById('sb-summary-placeholder');
          const sum = document.getElementById('sb-summary-text');
          if (dot) dot.classList.remove('visible');
          if (ph)  ph.style.display = '';
          if (sum) { sum.textContent = ''; sum.classList.remove('visible'); }
        }

        function runConversation() {
          body.innerHTML = '';
          senderGroup = null;
          agentGroup  = null;
          hideTyping();
          body.style.opacity = '1';
          resetSidebar();

          body.insertAdjacentHTML('afterbegin', `
            <div class="chatbox-date-row">
              <div class="date-badge">
                <svg viewBox="0 0 146.559 22.612" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M136.509 0H10.0498C4.49944 0 0 4.49943 0 10.0498V12.5622C0 18.1125 4.49944 22.612 10.0498 22.612H136.509C142.06 22.612 146.559 18.1125 146.559 12.5622V10.0498C146.559 4.49943 142.06 0 136.509 0Z" fill="#E8E8E8"/>
                </svg>
                <span class="date-badge-text">WEDNESDAY, APR 16 2025</span>
              </div>
            </div>
          `);

          // t=800: Customer opens conversation
          setTimeout(() => appendBubble('sender', "Hi, I placed an order last week and it still hasn't arrived."), 800);

          // t=2200: Agent typing
          setTimeout(() => showTyping(), 2200);
          // t=3600: Agent first response
          setTimeout(() => {
            hideTyping();
            appendBubble('agent', "Hello! I'm sorry to hear that. Could you share your order number so I can look into this for you?");
          }, 3600);

          // t=5200: Customer typing
          setTimeout(() => showTyping('sender'), 5200);
          // t=6400: Customer hesitates (new group)
          setTimeout(() => {
            hideTyping();
            senderGroup = null;
            appendBubble('sender', "Ugh hold on, let me find it\u2026 it's somewhere in my email");
          }, 6400);
          // t=8000: Customer sends ID (same group)
          setTimeout(() => appendBubble('sender', "Okay got it \u2014 order ID is QSC12345"), 8000);

          // t=9200: Agent typing (new group)
          setTimeout(() => { agentGroup = null; showTyping(); }, 9200);
          // t=10800: Agent acknowledges
          setTimeout(() => {
            hideTyping();
            appendBubble('agent', "Thanks! I'm pulling up order #QSC12345 now\u2026");
          }, 10800);
          // t=12500: Agent follows up (same group)
          setTimeout(() => appendBubble('agent', "I can see it was shipped 5 days ago. Let me check the latest delivery status."), 12500);

          // SIDEBAR: Order ID
          activateSidebarField('sb-order-id', '#QSC12345', 13000);

          // t=14500: Customer typing (new group)
          setTimeout(() => { senderGroup = null; showTyping('sender'); }, 14500);
          // t=15500: Customer expresses urgency
          setTimeout(() => {
            hideTyping();
            appendBubble('sender', "It was supposed to arrive in 2\u20133 days. I genuinely need this today, it's urgent");
          }, 15500);

          // SIDEBAR: Issue
          activateSidebarField('sb-issue', 'Order not received after 5 days', 16500);

          // t=17500: Agent typing (new group)
          setTimeout(() => { agentGroup = null; showTyping(); }, 17500);
          // t=19000: Agent asks for address
          setTimeout(() => {
            hideTyping();
            appendBubble('agent', "I completely understand the urgency. Can you confirm the delivery address is still correct?");
          }, 19000);

          // t=21000: Customer typing (new group)
          setTimeout(() => { senderGroup = null; showTyping('sender'); }, 21000);
          // t=22000: Customer confirms address
          setTimeout(() => {
            hideTyping();
            appendBubble('sender', "Yes \u2014 Jl. Sudirman No. 45, Jakarta. Same as always.");
          }, 22000);
          // t=23000: Customer adds frustration (same group)
          setTimeout(() => appendBubble('sender', "I also already tried calling the courier and they said they couldn't locate the package"), 23000);

          // SIDEBAR: Last Action
          activateSidebarField('sb-last-action', 'Agent checking with logistics', 23500);

          // t=25000: Agent typing (new group)
          setTimeout(() => { agentGroup = null; showTyping(); }, 25000);
          // t=26500: Agent escalates
          setTimeout(() => {
            hideTyping();
            appendBubble('agent', "I've escalated this to our logistics team. They'll contact you within 1\u20132 hours via WhatsApp.");
          }, 26500);

          // t=28000: Customer follow-up (new group)
          setTimeout(() => { senderGroup = null; showTyping('sender'); }, 28000);
          // t=29000: Customer pushes back
          setTimeout(() => {
            hideTyping();
            appendBubble('sender', "1\u20132 hours?? Can you at least tell me where my package is right now?");
          }, 29000);

          // SIDEBAR: Suggested Next Step
          activateSidebarField('sb-next-step', 'Provide delivery status update or escalate', 29500);

          // t=30500: Agent typing (new group)
          setTimeout(() => { agentGroup = null; showTyping(); }, 30500);
          // t=32000: Agent gives last known location
          setTimeout(() => {
            hideTyping();
            appendBubble('agent', "The last tracking update shows your package was scanned at our Jakarta sorting facility on Monday morning.");
          }, 32000);

          // t=33500: Customer reacts (new group)
          setTimeout(() => { senderGroup = null; showTyping('sender'); }, 33500);
          // t=34500: Customer is frustrated
          setTimeout(() => {
            hideTyping();
            appendBubble('sender', "That was 4 days ago!! It hasn't moved at all since then?!");
          }, 34500);

          // SIDEBAR: Summary starts generating
          runSummaryTypewriter(35000);

          // t=36500: Agent typing (new group)
          setTimeout(() => { agentGroup = null; showTyping(); }, 36500);
          // t=38500: Agent final response
          setTimeout(() => {
            hideTyping();
            appendBubble('agent', "I sincerely apologize for this inconvenience. I am now on the line with the courier directly to get this resolved immediately.");
          }, TOTAL_DURATION);

        }

        runConversation();

      })();
    </script>


  </div><!-- /chatbox -->


  <!-- ════════════ RIGHT: Conversation Summary ════════════ -->

        </svg>

      <div class="sb-customer-info">

        </div>
        <svg width="14" height="15" viewBox="0 0 14 15" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9.8 1.5L12.5 4.2L4.5 12.2L1.8 12.5L2.1 9.8L9.8 1.5Z" stroke="#23B098" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

    <!-- Order ID -->
    <div class="sb-field">
      <span class="sb-field-label">Order ID:</span>
      <span id="sb-order-id" class="sb-field-value">—</span>
    </div>

    <!-- Issue -->
    <div class="sb-field">
      <span class="sb-field-label">Issue:</span>
      <span id="sb-issue" class="sb-field-value">—</span>
    </div>

    <!-- Last Action -->
    <div class="sb-field">
      <span class="sb-field-label">Last Action:</span>
      <span id="sb-last-action" class="sb-field-value">—</span>
    </div>

    <!-- Suggested Next Step -->
    <div class="sb-field">
      <span class="sb-field-label">Suggested Next Step:</span>
      <span id="sb-next-step" class="sb-field-value">—</span>
    </div>

    <!-- Summary -->
    <div class="sb-field sb-field-summary">
      <span class="sb-field-label">Summary:</span>
      <div class="sb-summary-box">
        <div id="sb-ai-dot" class="sb-ai-dot">Agent Copilot generating...</div>
        <span id="sb-summary-placeholder" class="sb-summary-placeholder">Summary shows here...</span>
        <div id="sb-summary-text" class="sb-summary-text"></div>
      </div>
    </div>

  </div><!-- /cust-info -->
