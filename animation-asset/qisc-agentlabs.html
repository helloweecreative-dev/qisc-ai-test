<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgentLabs Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #e5e5e5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }

    /* ─── root wrapper ─── */
    .agentlabs-room {
      display: flex;
      width: 1232px;
      height: 729px;
      overflow: hidden;
      border: 2px solid #f2f2f2;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.12);
    }

    /* ══════════════════════════════════════
       LEFT — ChatBox  (892 px)
    ══════════════════════════════════════ */
    .chatbox {
      display: flex;
      flex-direction: column;
      width: 892px;
      height: 729px;
      background: #f7f7f7;
      border-right: 1px solid #eeeeee;
      flex-shrink: 0;
    }

    /* top bar */
    .chatbox-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      height: 76px;
      padding: 8px 28px;
      background: #ffffff;
      border-bottom: 1px solid #f2f2f2;
      flex-shrink: 0;
    }

    .chatbox-name-group {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .chatbox-avatar {
      position: relative;
      width: 35px;
      height: 35px;
      flex-shrink: 0;
    }
    .chatbox-avatar svg { width: 35px; height: 35px; display: block; }
    .chatbox-avatar-initial {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 500;
      color: #fff;
      line-height: 1;
      padding-bottom: 1px;
    }

    .chatbox-sender-name {
      font-size: 14px;
      font-weight: 700;
      color: #666666;
      white-space: nowrap;
    }

    .chatbox-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chatbox-label-agentlabs {
      font-size: 12px;
      font-weight: 400;
      color: #666666;
      white-space: nowrap;
    }

    .chatbox-toggle { width: 32.64px; height: 17.80px; flex-shrink: 0; display: flex; }
    .chatbox-toggle svg { width: 100%; height: 100%; }

    .chatbox-resolve { width: 64.54px; height: 17.80px; flex-shrink: 0; display: flex; }
    .chatbox-resolve svg { width: 100%; height: 100%; }

    .chatbox-info { width: 14.84px; height: 14.84px; flex-shrink: 0; display: flex; }
    .chatbox-info svg { width: 100%; height: 100%; }

    .chatbox-menu { width: 2.97px; height: 11.87px; flex-shrink: 0; display: flex; }
    .chatbox-menu svg { width: 100%; height: 100%; }

    /* date notification */
    .chatbox-date-row {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .date-badge {
      position: relative;
      width: 146.56px;
      height: 22.61px;
      flex-shrink: 0;
    }
    .date-badge svg { width: 100%; height: 100%; display: block; }
    .date-badge-text {
      position: absolute;
      top: 5px;
      left: 29px;
      font-size: 8px;
      font-weight: 700;
      color: #898e97;
      white-space: nowrap;
      letter-spacing: 0.3px;
      line-height: 1.5;
    }

    /* ── chat body ── */
    .chatbox-body {
      flex: 1;
      background: #f7f7f7;
      overflow-y: auto;
      padding: 44px 0 76px;
      display: flex;
      flex-direction: column;
      gap: 61px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .chatbox-body::-webkit-scrollbar { display: none; }
    .chatbox-body { transition: opacity 0.6s ease; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── message group (avatar + stacked bubbles) ── */
    .cf-group {
      display: flex;
      align-items: flex-start;
      gap: 11px;
      animation: fadeInUp 0.3s ease-out forwards;
    }
    .cf-group.cf-sender { padding-left: 28px; }
    .cf-group.cf-agent  { flex-direction: row-reverse; padding-right: 28px; }

    /* avatar circle */
    .cf-avatar {
      position: relative;
      width: 35px;
      height: 35px;
      flex-shrink: 0;
    }
    .cf-avatar svg { width: 35px; height: 35px; display: block; }
    .cf-avatar-initial {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 400;
      color: #fff;
      line-height: 1;
    }

    /* bubble column */
    .cf-content {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 500px;
    }
    .cf-group.cf-sender .cf-content { max-width: 540px; }
    .cf-group.cf-agent  .cf-content { align-items: flex-end; }

    .cf-name {
      font-size: 10px;
      font-weight: 400;
      color: #828282;
      letter-spacing: -0.17px;
      line-height: 1;
    }

    /* ── bubbles ── */
    .cf-bubble-img {
      display: block;
      width: 100%;
      border-radius: 15px 15px 0 0;
      object-fit: cover;
    }
    .cf-bubble-body { padding: 8px 14px; }

    .cf-bubble {
      animation: fadeInUp 0.3s ease-out forwards;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.5;
      color: #374151;
      word-break: break-word;
    }
    /* customer: green, flat top-left */
    .cf-sender-bubble {
      background: #D2EDDB;
      border-radius: 0 15px 15px 15px;
    }
    /* agent: white, flat bottom-right */
    .cf-agent-bubble {
      background: #ffffff;
      border-radius: 15px 15px 0 15px;
      color: #0f172a;
      font-weight: 400;
    }

    /* ── card bubble ── */
    .cf-card {
      border-radius: 8px !important;
      padding: 8px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .cf-card-preview {
      display: flex;
      gap: 0;
      background: #ececec;
      border-radius: 5px;
      overflow: hidden;
      height: 105px;
    }
    .cf-card-img {
      width: 120px;
      height: 105px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .cf-card-meta {
      padding: 13px 13px 13px 24px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .cf-card-title {
      font-size: 14px;
      font-weight: 700;
      color: #374151;
      line-height: 1.3;
    }
    .cf-card-sub {
      font-size: 11px;
      font-weight: 400;
      color: #6b7280;
      line-height: 1.28;
    }
    .cf-card-body {
      font-size: 15px;
      font-weight: 400;
      color: #0f172a;
      line-height: 1.5;
    }
    .cf-card-body strong { font-weight: 700; }

    /* ── CTA bubble ── */
    .cf-cta {
      border-radius: 8px !important;
      text-align: center;
      font-weight: 700 !important;
      color: #27B199 !important;
      background: #ffffff;
      width: 100%;
      box-sizing: border-box;
    }

    /* ── booking summary rows ── */
    .cf-booking-summary {
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #f3faf9;
      border-radius: 6px;
      padding: 14px 16px;
    }
    .cf-booking-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 14px;
      line-height: 1.5;
    }
    .cf-booking-label {
      color: #6b7280;
      font-weight: 400;
      flex-shrink: 0;
    }
    .cf-booking-value {
      color: #111827;
      font-weight: 600;
      text-align: right;
    }

    /* ── typing indicator ── */
    .cf-typing {
      display: flex;
      align-items: flex-start;
      gap: 11px;
      animation: fadeInUp 0.3s ease-out forwards;
    }
    .cf-typing.cf-sender { padding-left: 28px; }
    .cf-typing.cf-agent  { flex-direction: row-reverse; padding-right: 28px; }
    .cf-typing-dots {
      background: #ffffff;
      border-radius: 15px 15px 0 15px;
      padding: 10px 14px;
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .cf-typing-dots span {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #aaa;
      display: inline-block;
      animation: dotBounce 0.9s infinite ease-in-out;
    }
    .cf-typing-dots span:nth-child(1) { animation-delay:   0ms; }
    .cf-typing-dots span:nth-child(2) { animation-delay: 150ms; }
    .cf-typing-dots span:nth-child(3) { animation-delay: 300ms; }

    @keyframes dotBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-6px); }
    }

    /* ══════════════════════════════════════
       RIGHT — Sidebar: Chat & Customer Info (340 px)
    ══════════════════════════════════════ */
    .cust-info {
      display: flex;
      flex-direction: column;
      width: 340px;
      height: 729px;
      background: #ffffff;
      border-left: 1px solid #eeeeee;
      flex-shrink: 0;
      overflow: hidden;
    }

    /* ── Header ── */
    .sb-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 76px;
      padding: 0 21px;
      background: #fafaf7;
      flex-shrink: 0;
    }
    .sb-title {
      font-size: 13.45px;
      font-weight: 500;
      color: #555555;
      white-space: nowrap;
      line-height: normal;
    }
    .sb-close {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
    }

    /* ── Profile section ── */
    .sb-profile {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 24px 20px;
      background: #ffffff;
      flex-shrink: 0;
    }
    .sb-avatar-wrap {
      position: relative;
      width: 45px;
      height: 45px;
      flex-shrink: 0;
    }
    .sb-avatar-img {
      display: block;
      width: 45px;
      height: 45px;
    }
    .sb-avatar-initial {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 27px;
      font-weight: 500;
      color: #ffffff;
      line-height: 1;
    }
    .sb-wa-badge {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 13px;
      height: 13px;
      display: block;
    }
    .sb-customer-info {
      display: flex;
      flex: 1;
      align-items: flex-start;
      justify-content: space-between;
      min-width: 0;
    }
    .sb-customer-details {
      display: flex;
      flex-direction: column;
      gap: 2px;
      width: 117px;
    }
    .sb-customer-name {
      font-size: 13.45px;
      font-weight: 700;
      color: #555555;
      line-height: normal;
    }
    .sb-customer-channel {
      font-size: 11.769px;
      font-weight: 600;
      color: #555555;
      line-height: normal;
    }
    .sb-icon-edit {
      width: 14.024px;
      height: 15.131px;
      display: block;
      flex-shrink: 0;
    }

    /* ── Info rows (Ticketing, Properties, Notes) ── */
    .sb-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 20px;
      border-top: 1px solid #efefef;
      flex-shrink: 0;
    }
    .sb-row-label {
      font-size: 11.769px;
      font-weight: 600;
      color: #a1a0a3;
      text-transform: uppercase;
      white-space: nowrap;
      line-height: normal;
    }
    .sb-row-teal {
      font-size: 11.769px;
      font-weight: 500;
      color: #23b098;
      letter-spacing: -0.053px;
      line-height: normal;
    }
    .sb-badge {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sb-badge-count {
      font-size: 10.087px;
      font-weight: 700;
      color: #2cb79e;
      line-height: normal;
    }
    .sb-chevron {
      width: 5.044px;
      height: 10.087px;
      display: block;
    }
    .sb-notes-right {
      display: flex;
      align-items: center;
      gap: 13px;
    }
    .sb-note-text {
      font-size: 10.087px;
      font-weight: 400;
      color: #2cb79e;
      white-space: nowrap;
      margin-top: 0.84px;
      line-height: normal;
    }
    .sb-note-icon {
      position: relative;
      width: 11.348px;
      height: 13.87px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .sb-note-icon img {
      position: absolute;
      width: 7111.11%;
      height: 3636.36%;
      left: -6883.33%;
      top: -1500%;
      max-width: none;
    }

    /* ── Tags section ── */
    .sb-tags {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 20px;
      border-top: 1px solid #efefef;
      flex: 1;
      min-height: 0;
    }
    .sb-tags-label {
      font-size: 11.769px;
      font-weight: 600;
      color: #a1a0a3;
      text-transform: uppercase;
      line-height: normal;
      flex-shrink: 0;
    }
    .sb-tags-input-row {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .sb-tags-input-box {
      position: relative;
      width: 264.706px;
      height: 31.944px;
      border: 0.841px solid #ededed;
      border-radius: 5.044px;
      background: #ffffff;
      flex-shrink: 0;
    }
    .sb-tags-placeholder {
      position: absolute;
      left: 14px;
      top: 5.94px;
      font-size: 12px;
      font-weight: 400;
      color: #9ca3af;
      opacity: 0.5;
      letter-spacing: -0.24px;
      line-height: 1.55;
      white-space: nowrap;
    }
    .sb-tags-check {
      width: 14.118px;
      height: 8.406px;
      display: block;
      flex-shrink: 0;
      margin-left: 21.176px;
    }
    .sb-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-content: flex-start;
    }
    .sb-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 12px;
      background: #d2eddb;
      border-radius: 24px;
      font-size: 11px;
      font-weight: 500;
      color: #374151;
      letter-spacing: -0.22px;
      line-height: 1.55;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<div class="agentlabs-room">

  <!-- ════════════ LEFT: ChatBox ════════════ -->
  <div class="chatbox">

    <!-- Header -->
    <div class="chatbox-header">
      <!-- Left: Avatar + Name -->
      <div class="chatbox-name-group">
        <div class="chatbox-avatar">
          <!-- pp-bg-chatbox circle -->
          <svg viewBox="0 0 35 35" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="17.5" cy="17.5" r="17.5" fill="#8D8DF2"/>
          </svg>
          <div class="chatbox-avatar-initial">R</div>
        </div>
        <span class="chatbox-sender-name">Robert Wilson</span>
      </div>

      <!-- Right: Controls -->
      <div class="chatbox-controls">
        <span class="chatbox-label-agentlabs">AgentLabs</span>

        <!-- Toggle button -->
        <div class="chatbox-toggle">
          <svg viewBox="0 0 32.6423 17.8049" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M0 8.90245C0 3.98577 3.98606 0 8.90243 0H23.7398C28.6562 0 32.6423 3.98577 32.6423 8.90245C32.6423 13.8191 28.6562 17.8049 23.7398 17.8049H8.90243C3.98606 17.8049 0 13.8191 0 8.90245Z" fill="#23B098"/>
            <circle cx="23.7388" cy="8.9027" r="7.3187" fill="white" filter="drop-shadow(0 0.2px 0.8px rgba(97,86,86,.19))"/>
          </svg>
        </div>

        <!-- Resolve button -->
        <div class="chatbox-resolve">
          <svg viewBox="0 0 64.5428 17.8049" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M55.6403 0H8.90245C3.98576 0 0 3.98576 0 8.90245C0 13.8191 3.98576 17.8049 8.90245 17.8049H55.6403C60.557 17.8049 64.5427 13.8191 64.5427 8.90245C64.5427 3.98576 60.557 0 55.6403 0Z" fill="#27B199"/>

352L45.4524 6.94702ZM48.6921 12.7229C50.0119 12.7229 50.9192 12.0774 51.1558 11.0927L49.9088 10.9525C49.7285 11.432 49.2856 11.6828 48.7099 11.6828C47.8471 11.6828 47.2751 11.1148 47.2647 10.1448H51.2108V9.73542C51.2108 7.74743 50.0156 6.87328 48.6216 6.87328C46.9992 6.87328 45.9405 8.06458 45.9405 9.81287C45.9405 11.5906 46.9843 12.7229 48.6921 12.7229ZM47.2685 9.24482C47.3085 8.52194 47.8434 7.91339 48.6402 7.91339C49.4073 7.91339 49.9236 8.47402 49.931 9.24482H47.2685Z" fill="white"/>
          </svg>
        </div>

        <!-- Info icon -->
        <div class="chatbox-info">
          <svg viewBox="0 0 14.8373 14.8375" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7.41861 14.8374C11.5158 14.8374 14.8372 11.5159 14.8372 7.4187C14.8372 3.32147 11.5158 0 7.41861 0C3.32143 0 0 3.32147 0 7.4187C0 11.5159 3.32143 14.8374 7.41861 14.8374Z" fill="#27B199"/>
            <path d="M8.15859 6.67645H6.67494V11.1277H8.15859V6.67645Z" fill="white"/>
            <path d="M8.15859 3.7086H6.67494V5.19234H8.15859V3.7086Z" fill="white"/>
          </svg>
        </div>

        <!-- Menu dots -->

        /* ── build avatar node ── */
        function makeAvatar(type) {
          const el = document.createElement('div');
          el.className = 'cf-avatar';
          if (type === 'sender') {
            el.innerHTML = SENDER_AVATAR_SVG +
              '<span class="cf-avatar-initial">R</span>';
          } else {
            el.innerHTML = AGENT_AVATAR_SVG;
          }
          return el;
        }

        /* ── get or create a message group ── */
        let senderGroup = null, agentGroup = null;

        function getOrCreateGroup(type) {
          if (type === 'sender' && senderGroup) return senderGroup;
          if (type === 'agent'  && agentGroup)  return agentGroup;

          const group = document.createElement('div');
          group.className = 'cf-group cf-' + type;

          const avatar = makeAvatar(type);

          const content = document.createElement('div');
          content.className = 'cf-content';

          const name = document.createElement('div');
          name.className = 'cf-name';
          name.textContent = type === 'sender' ? 'Robert Wilson' : 'AgentLabs • Qiscus';
          if (type === 'agent') name.style.textAlign = 'right';
          content.appendChild(name);

          group.appendChild(avatar);
          group.appendChild(content);
          body.appendChild(group);

          if (type === 'sender') senderGroup = group;
          else agentGroup = group;

          return group;
        }

        function getContent(type) {
          return (type === 'sender' ? senderGroup : agentGroup)
            .querySelector('.cf-content');
        }

        /* ── append a plain bubble ── */
        function appendBubble(type, text) {
          getOrCreateGroup(type);
          const bubble = document.createElement('div');
          bubble.className = 'cf-bubble cf-' + type + '-bubble';
          bubble.innerHTML = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
          getContent(type).appendChild(bubble);
          smartScroll();
        }

        /* ── append the Figma card + CTA ── */
        function appendBookingCard() {
          getOrCreateGroup('agent');
          const content = getContent('agent');

          // booking summary card
          const card = document.createElement('div');
          card.className = 'cf-bubble cf-agent-bubble cf-card';
          card.innerHTML = `
            <p class="cf-card-body"><strong>Here's your booking summary:</strong></p>
            <div class="cf-booking-summary">
              <div class="cf-booking-row">
                <span class="cf-booking-label">Service</span>
                <span class="cf-booking-value">AC General Cleaning</span>
              </div>
              <div class="cf-booking-row">
                <span class="cf-booking-label">Location</span>
                <span class="cf-booking-value">Jakarta Selatan</span>
              </div>
              <div class="cf-booking-row">
                <span class="cf-booking-label">Schedule</span>
                <span class="cf-booking-value">Tomorrow, 13:00 – 15:00</span>
              </div>
            </div>
            <p class="cf-card-body">Would you like to confirm this booking?</p>
          `;
          content.appendChild(card);

          // CTA bubble
          const cta = document.createElement('div');
          cta.className = 'cf-bubble cf-agent-bubble cf-cta';
          cta.textContent = 'Confirm Booking';
          content.appendChild(cta);

          smartScroll();
        }

        /* ── typing indicator (sender or agent side) ── */
        let typingEl = null;
        function showTyping(type = 'agent') {
          typingEl = document.createElement('div');
          const isSender = type === 'sender';
          typingEl.className = isSender ? 'cf-typing cf-sender' : 'cf-typing cf-agent';
          const avatarWrap = document.createElement('div');
          avatarWrap.className = 'cf-avatar';
          if (isSender) {
            avatarWrap.innerHTML = SENDER_AVATAR_SVG + '<span class="cf-avatar-initial">R</span>';
          } else {
            avatarWrap.innerHTML = AGENT_AVATAR_SVG;
          }
          const dots = document.createElement('div');
          dots.className = 'cf-typing-dots';
          dots.innerHTML = '<span></span><span></span><span></span>';
          typingEl.appendChild(avatarWrap);
          typingEl.appendChild(dots);
          body.appendChild(typingEl);
          smartScroll();
        }
        function hideTyping() {
          if (typingEl) { body.removeChild(typingEl); typingEl = null; }
        }

        /* ── animation timeline ── */
        const TOTAL_DURATION = 21000; // ms when last message lands
        const LOOP_PAUSE     = 4000; // ms to wait after last message before reset
        const FADE_DURATION  =  600; // ms for fade-out transition

        function runConversation() {
          // reset: DOM is already invisible (opacity:0) from previous fade-out,
          // so clearing and snapping opacity back is seamless
          body.innerHTML = '';
          senderGroup = null;
          agentGroup  = null;
          hideTyping();
          body.style.opacity = '1'; // fade back in once content will appear

          // inject date badge as first item inside the scrollable body
          body.insertAdjacentHTML('afterbegin', `
            <div class="chatbox-date-row">
              <div class="date-badge">
                <svg viewBox="0 0 146.559 22.612" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M136.509 0H10.0498C4.49944 0 0 4.49943 0 10.0498V12.5622C0 18.1125 4.49944 22.612 10.0498 22.612H136.509C142.06 22.612 146.559 18.1125 146.559 12.5622V10.0498C146.559 4.49943 142.06 0 136.509 0Z" fill="#E8E8E8"/>
                </svg>
                <span class="date-badge-text">FRIDAY, JULY 29 2025</span>
              </div>
            </div>
          `);

          // t=800 : user opens conversation
          setTimeout(() => appendBubble('sender', "Hi, I want to book an AC service."), 800);

          // t=2000 : agent typing → t=3200 agent offers service types
          setTimeout(() => showTyping(), 2000);
          setTimeout(() => {
            hideTyping();
            appendBubble('agent', "Sure! What type of service do you need?\n• General cleaning\n• Repair\n• Installation");
          }, 3200);

          // t=4500 : user picks service type
          setTimeout(() => showTyping('sender'), 4500);
          setTimeout(() => {
            hideTyping();
            senderGroup = null;
            appendBubble('sender', "General cleaning");
          }, 5500);

          // t=6500 : agent asks for location
          setTimeout(() => {
            agentGroup = null;
            showTyping();
          }, 6500);
          setTimeout(() => {
            hideTyping();
            appendBubble('agent', "Got it. Where should we send the technician?");
          }, 7500);

          // t=8500 : user gives location
          setTimeout(() => showTyping('sender'), 8500);
          setTimeout(() => {
            hideTyping();
            senderGroup = null;
            appendBubble('sender', "Jakarta Selatan");
          }, 9500);

          // t=10500 : agent asks for schedule
          setTimeout(() => {
            agentGroup = null;
            showTyping();
          }, 10500);
          setTimeout(() => {
            hideTyping();
            appendBubble('agent', "When would you like to schedule?\n• Today\n• Tomorrow\n• Pick a date");
          }, 11500);

          // t=12500 : user picks date + time slot
          setTimeout(() => showTyping('sender'), 12500);
          setTimeout(() => {
            hideTyping();
            senderGroup = null;
            appendBubble('sender', "Tomorrow, 13:00 – 15:00");
          }, 13500);

          // t=14500 : agent typing → t=15500 agent shows booking summary card
          setTimeout(() => {
            agentGroup = null;
            showTyping();
          }, 14500);
          setTimeout(() => {
            hideTyping();
            appendBookingCard();
          }, 15500);

          // t=17000 : user confirms
          setTimeout(() => showTyping('sender'), 17000);
          setTimeout(() => {
            hideTyping();
            senderGroup = null;
            appendBubble('sender', "Yes");
          }, 18000);

          // t=19000 : agent confirms booking
          setTimeout(() => {
            agentGroup = null;
            showTyping();
          }, 19000);
          setTimeout(() => {
            hideTyping();
            appendBubble('agent', "Your booking is confirmed! ✓\nA technician will arrive at the scheduled time. You’ll receive a reminder before the visit.");
          }, TOTAL_DURATION);

        }

        runConversation();

      })();
    </script>
